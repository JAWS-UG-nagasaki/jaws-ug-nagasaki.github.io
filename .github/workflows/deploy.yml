name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Build site
        env:
          SITEURL: https://jaws-ug-nagasaki.github.io
          DISCORD_URL: ${{ secrets.DISCORD_URL }}
        run: uv run pelican -s publishconf.py

      - name: Copy static files
        run: |
          cp content/static/favicon.ico output/favicon.ico
          cp content/static/custom.css output/custom.css
          cp content/static/googled0690c3ab706fd43.html output/googled0690c3ab706fd43.html
          cp content/static/robots.txt output/robots.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
